<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a2847;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d0f1f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00c2ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00ffae;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bgGrad)"/>

  <!-- Decorative background circles -->
  <circle cx="150" cy="100" r="200" fill="#00c2ff" opacity="0.05"/>
  <circle cx="1050" cy="700" r="250" fill="#00ffae" opacity="0.05"/>

  <!-- Top accent bar -->
  <rect width="1200" height="8" fill="url(#accentGrad)"/>

  <!-- Main content area -->
  <g>
    <!-- Left side - Icon/Visual -->
    <g transform="translate(100, 150)">
      <!-- Industrial gear base -->
      <circle cx="250" cy="250" r="180" fill="none" stroke="url(#accentGrad)" stroke-width="3" opacity="0.3"/>

      <!-- Outer gear -->
      <g filter="url(#glow)">
        <circle cx="250" cy="250" r="140" fill="none" stroke="#00c2ff" stroke-width="4" opacity="0.6"/>
        <!-- Gear teeth -->
        <g stroke="#00c2ff" stroke-width="8" stroke-linecap="round" opacity="0.8">
          <line x1="250" y1="110" x2="250" y2="80"/>
          <line x1="349" y1="151" x2="369" y2="131"/>
          <line x1="390" y1="250" x2="420" y2="250"/>
          <line x1="349" y1="349" x2="369" y2="369"/>
          <line x1="250" y1="390" x2="250" y2="420"/>
          <line x1="151" y1="349" x2="131" y2="369"/>
          <line x1="110" y1="250" x2="80" y2="250"/>
          <line x1="151" y1="151" x2="131" y2="131"/>
        </g>
      </g>

      <!-- Inner circle -->
      <circle cx="250" cy="250" r="70" fill="#00c2ff" opacity="0.1"/>
      <circle cx="250" cy="250" r="50" fill="none" stroke="#00ffae" stroke-width="2" stroke-dasharray="5,5"/>

      <!-- Center dot -->
      <circle cx="250" cy="250" r="12" fill="#00ffae" filter="url(#glow)"/>

      <!-- Accent elements -->
      <g fill="none" stroke="#00ffae" stroke-width="2" opacity="0.6">
        <path d="M 250 200 Q 280 220 300 250"/>
        <path d="M 250 300 Q 280 280 300 250"/>
      </g>
    </g>

    <!-- Right side - Text content -->
    <g transform="translate(600, 180)">
      <!-- Title -->
      <text x="0" y="0" font-size="56" font-weight="bold" fill="#ffffff" font-family="Segoe UI, Arial">
        JATEAMENTO
      </text>
      <text x="0" y="65" font-size="18" fill="#00c2ff" font-family="Segoe UI, Arial" letter-spacing="3">
        ABRASIVO INDUSTRIAL
      </text>

      <!-- Divider -->
      <line x1="0" y1="100" x2="280" y2="100" stroke="url(#accentGrad)" stroke-width="2"/>

      <!-- Descriptive text -->
      <text x="0" y="160" font-size="16" fill="#d0d0d0" font-family="Segoe UI, Arial" font-weight="400">
        <tspan x="0" y="160">Processo de limpeza com granalha</tspan>
        <tspan x="0" y="190">de aço e microesfera. Tecnologia</tspan>
        <tspan x="0" y="220">de ponta para remover ferrugem,</tspan>
        <tspan x="0" y="250">tinta e resíduos industriais.</tspan>
      </text>

      <!-- Feature points -->
      <g font-size="14" fill="#00ffae" font-family="Segoe UI, Arial">
        <text x="0" y="330">✓ Alta precisão e uniformidade</text>
        <text x="0" y="365">✓ Superfícies perfeitamente limpas</text>
        <text x="0" y="400">✓ Pronto para pintura e tratamento</text>
      </g>
    </g>
  </g>

  <!-- Bottom decorative elements -->
  <g opacity="0.3">
    <circle cx="100" cy="750" r="3" fill="#00c2ff"/>
    <circle cx="150" cy="750" r="3" fill="#00c2ff"/>
    <circle cx="200" cy="750" r="3" fill="#00c2ff"/>
    <circle cx="250" cy="750" r="5" fill="#00ffae"/>
    <circle cx="300" cy="750" r="3" fill="#00c2ff"/>
    <circle cx="350" cy="750" r="3" fill="#00c2ff"/>
    <circle cx="400" cy="750" r="3" fill="#00c2ff"/>
  </g>
</svg>