<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f2e1a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a4733;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1f14;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffae;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00c2ff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bgGrad)"/>

  <!-- Decorative background circles -->
  <circle cx="200" cy="150" r="220" fill="#00ffae" opacity="0.05"/>
  <circle cx="1000" cy="650" r="280" fill="#00c2ff" opacity="0.05"/>

  <!-- Top accent bar -->
  <rect width="1200" height="8" fill="url(#accentGrad)"/>

  <!-- Main content area -->
  <g>
    <!-- Left side - Wrench/Tools visual -->
    <g transform="translate(80, 140)">
      <!-- Wrench 1 -->
      <g filter="url(#glow)" opacity="0.8">
        <!-- Handle -->
        <rect x="80" y="180" width="180" height="35" rx="17" fill="none" stroke="#00ffae" stroke-width="6"/>
        <!-- Head -->
        <path d="M 80 180 Q 60 180 60 200 Q 60 220 80 220 L 80 160 Q 60 160 60 180 Z" fill="none" stroke="#00ffae" stroke-width="6" stroke-linecap="round"/>
        <!-- Bolt -->
        <circle cx="35" cy="190" r="12" fill="#00ffae" opacity="0.6"/>
      </g>

      <!-- Wrench 2 (offset) -->
      <g filter="url(#glow)" opacity="0.7" transform="translate(60, 120)">
        <!-- Handle -->
        <rect x="80" y="180" width="180" height="35" rx="17" fill="none" stroke="#00c2ff" stroke-width="6"/>
        <!-- Head -->
        <path d="M 80 180 Q 60 180 60 200 Q 60 220 80 220 L 80 160 Q 60 160 60 180 Z" fill="none" stroke="#00c2ff" stroke-width="6" stroke-linecap="round"/>
        <!-- Bolt -->
        <circle cx="35" cy="190" r="12" fill="#00c2ff" opacity="0.5"/>
      </g>

      <!-- Gear (maintenance symbol) -->
      <g transform="translate(280, 220)">
        <circle cx="0" cy="0" r="60" fill="none" stroke="#00ffae" stroke-width="3" opacity="0.5"/>
        <g stroke="#00ffae" stroke-width="5" stroke-linecap="round" opacity="0.8">
          <line x1="0" y1="-70" x2="0" y2="-90"/>
          <line x1="49" y1="-49" x2="63" y2="-63"/>
          <line x1="70" y1="0" x2="90" y2="0"/>
          <line x1="49" y1="49" x2="63" y2="63"/>
          <line x1="0" y1="70" x2="0" y2="90"/>
          <line x1="-49" y1="49" x2="-63" y2="63"/>
          <line x1="-70" y1="0" x2="-90" y2="0"/>
          <line x1="-49" y1="-49" x2="-63" y2="-63"/>
        </g>
        <circle cx="0" cy="0" r="25" fill="#00ffae" opacity="0.1"/>
      </g>

      <!-- Connection lines -->
      <g stroke="#00c2ff" stroke-width="2" opacity="0.4" stroke-dasharray="5,5">
        <line x1="270" y1="200" x2="280" y2="220"/>
        <line x1="350" y1="220" x2="380" y2="240"/>
      </g>
    </g>

    <!-- Right side - Text content -->
    <g transform="translate(600, 180)">
      <!-- Title -->
      <text x="0" y="0" font-size="56" font-weight="bold" fill="#ffffff" font-family="Segoe UI, Arial">
        MANUTENÇÃO
      </text>
      <text x="0" y="65" font-size="18" fill="#00ffae" font-family="Segoe UI, Arial" letter-spacing="3">
        PREVENTIVA E CORRETIVA
      </text>

      <!-- Divider -->
      <line x1="0" y1="100" x2="320" y2="100" stroke="url(#accentGrad)" stroke-width="2"/>

      <!-- Descriptive text -->
      <text x="0" y="160" font-size="16" fill="#d0d0d0" font-family="Segoe UI, Arial" font-weight="400">
        <tspan x="0" y="160">Identificamos sinais de desgaste</tspan>
        <tspan x="0" y="190">e aplicamos soluções preventivas</tspan>
        <tspan x="0" y="220">para evitar corrosão em estruturas</tspan>
        <tspan x="0" y="250">metálicas industriais.</tspan>
      </text>

      <!-- Feature points -->
      <g font-size="14" fill="#00ffae" font-family="Segoe UI, Arial">
        <text x="0" y="330">✓ Análise profunda de superfícies</text>
        <text x="0" y="365">✓ Prevenção de corrosão avançada</text>
        <text x="0" y="400">✓ Durabilidade estendida garantida</text>
      </g>
    </g>
  </g>

  <!-- Bottom status indicators -->
  <g opacity="0.4">
    <rect x="80" y="720" width="8" height="50" rx="4" fill="#00ffae"/>
    <rect x="130" y="710" width="8" height="60" rx="4" fill="#00ffae"/>
    <rect x="180" y="700" width="8" height="70" rx="4" fill="#00c2ff"/>
    <rect x="230" y="710" width="8" height="60" rx="4" fill="#00ffae"/>
    <rect x="280" y="720" width="8" height="50" rx="4" fill="#00ffae"/>
  </g>
</svg>