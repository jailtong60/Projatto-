<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2e1a0f;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#473319;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1f0d0d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9800;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00c2ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="paintGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9800;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00ffae;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#00c2ff;stop-opacity:0.6" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bgGrad)"/>

  <!-- Decorative background circles -->
  <circle cx="180" cy="120" r="240" fill="#ff9800" opacity="0.05"/>
  <circle cx="1020" cy="680" r="260" fill="#00c2ff" opacity="0.05"/>

  <!-- Top accent bar -->
  <rect width="1200" height="8" fill="url(#accentGrad)"/>

  <!-- Main content area -->
  <g>
    <!-- Left side - Paint brush visual -->
    <g transform="translate(100, 140)">
      <!-- Paint can -->
      <g filter="url(#glow)">
        <!-- Can body -->
        <rect x="140" y="140" width="120" height="140" rx="8" fill="none" stroke="#ff9800" stroke-width="4" opacity="0.7"/>

        <!-- Paint inside (gradient fill) -->
        <rect x="148" y="200" width="104" height="70" rx="4" fill="url(#paintGrad)" opacity="0.6"/>

        <!-- Can rim -->
        <ellipse cx="200" cy="140" rx="62" ry="18" fill="none" stroke="#ff9800" stroke-width="4" opacity="0.7"/>

        <!-- Paint splash effect -->
        <path d="M 180 140 Q 160 120 140 130 Q 155 115 180 115 Q 205 115 220 130 Q 200 120 180 140"
              fill="#ff9800" opacity="0.4" filter="url(#glow)"/>
      </g>

      <!-- Paint brush -->
      <g filter="url(#glow)" transform="rotate(-35 250 200)">
        <!-- Handle -->
        <rect x="220" y="120" width="60" height="160" rx="30" fill="none" stroke="#00c2ff" stroke-width="5" opacity="0.8"/>

        <!-- Bristles -->
        <g stroke="#ff9800" stroke-width="4" stroke-linecap="round" opacity="0.7">
          <line x1="235" y1="115" x2="230" y2="85"/>
          <line x1="250" y1="110" x2="245" y2="70"/>
          <line x1="265" y1="115" x2="270" y2="80"/>
        </g>

        <!-- Bristle base -->
        <ellipse cx="250" cy="120" rx="18" ry="12" fill="#00ffae" opacity="0.4"/>
      </g>

      <!-- Decorative elements -->
      <g stroke="#00ffae" stroke-width="2" opacity="0.5" stroke-dasharray="5,5">
        <path d="M 300 200 Q 350 180 380 210"/>
        <path d="M 320 260 Q 360 240 390 270"/>
      </g>

      <!-- Paint drops -->
      <g opacity="0.6">
        <circle cx="340" cy="250" r="8" fill="#ff9800"/>
        <circle cx="360" cy="290" r="6" fill="#00ffae"/>
        <circle cx="320" cy="310" r="5" fill="#00c2ff"/>
      </g>
    </g>

    <!-- Right side - Text content -->
    <g transform="translate(600, 180)">
      <!-- Title -->
      <text x="0" y="0" font-size="56" font-weight="bold" fill="#ffffff" font-family="Segoe UI, Arial">
        PINTURA
      </text>
      <text x="0" y="65" font-size="18" fill="#ff9800" font-family="Segoe UI, Arial" letter-spacing="3">
        ACABAMENTO PROFISSIONAL
      </text>

      <!-- Divider -->
      <line x1="0" y1="100" x2="300" y2="100" stroke="url(#accentGrad)" stroke-width="2"/>

      <!-- Descriptive text -->
      <text x="0" y="160" font-size="16" fill="#d0d0d0" font-family="Segoe UI, Arial" font-weight="400">
        <tspan x="0" y="160">Preparação perfeita da superfície</tspan>
        <tspan x="0" y="190">garante aderência e durabilidade</tspan>
        <tspan x="0" y="220">máxima da pintura com acabamento</tspan>
        <tspan x="0" y="250">uniforme e resistente.</tspan>
      </text>

      <!-- Feature points -->
      <g font-size="14" fill="#ff9800" font-family="Segoe UI, Arial">
        <text x="0" y="330">✓ Superfície perfeitamente limpa</text>
        <text x="0" y="365">✓ Aderência máxima garantida</text>
        <text x="0" y="400">✓ Acabamento duradouro e uniforme</text>
      </g>
    </g>
  </g>

  <!-- Bottom color spectrum -->
  <g opacity="0.3">
    <rect x="80" y="740" width="40" height="40" rx="4" fill="#ff9800"/>
    <rect x="140" y="740" width="40" height="40" rx="4" fill="#ffb74d"/>
    <rect x="200" y="740" width="40" height="40" rx="4" fill="#00ffae"/>
    <rect x="260" y="740" width="40" height="40" rx="4" fill="#00c2ff"/>
    <rect x="320" y="740" width="40" height="40" rx="4" fill="#0a9fd1"/>
  </g>
</svg>